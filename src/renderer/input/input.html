<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
  <link rel="stylesheet" href="input.css" />
</head>
<body>
  <div class="card">
    <div class="eyebrow" id="eyebrow">CHECK-IN</div>
    <div class="label" id="label">Loading…</div>
    <form id="form">
      <textarea id="field" rows="3" placeholder="Type here…" autofocus></textarea>
      <div class="row">
        <span class="hint">Enter to save</span>
        <button type="submit">Save</button>
      </div>
    </form>
  </div>
  <script src="input.js"></script>
</body>
</html>

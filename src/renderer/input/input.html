<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
  <link rel="stylesheet" href="input.css" />
</head>
<body>
  <div class="card">
    <div class="eyebrow" id="eyebrow">CHECK-IN</div>
    <div class="label" id="label">Loading…</div>
    <form id="form">
      <div id="fields"></div>
      <button type="button" id="add" class="add">+ Add another</button>
      <div class="row">
        <span class="hint" id="hint">Enter to add · ⌘↵ to save</span>
        <button type="submit" class="save">Save</button>
      </div>
    </form>
  </div>
  <script src="input.js"></script>
</body>
</html>
